<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L9,5 L0,10 z" fill="#000000"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="560" fill="#ffffff"/>

  <!-- natural-language input -->
  <rect x="320" y="26" width="260" height="48" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="450" y="49" text-anchor="middle" font-size="15" fill="#000000">Natural-language query</text>
  <text x="450" y="66" text-anchor="middle" font-size="11.5" font-style="italic" fill="#000000">“flood risk here?”   “size this LID?”</text>
  <line x1="450" y1="74" x2="450" y2="104" stroke="#000000" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- aiswmm runtime -->
  <rect x="70" y="106" width="760" height="98" fill="#ffffff" stroke="#000000" stroke-width="2.5"/>
  <text x="100" y="148" font-size="25" font-weight="700" fill="#000000">aiswmm</text>
  <text x="100" y="174" font-size="13.5" fill="#000000">agentic runtime — interprets intent, selects and runs models, audits every step</text>
  <text x="815" y="126" text-anchor="end" font-size="11" font-style="italic" fill="#000000">separate repository</text>

  <line x1="270" y1="204" x2="270" y2="252" stroke="#000000" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="630" y1="204" x2="630" y2="252" stroke="#000000" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- LSTM engine -->
  <rect x="110" y="254" width="300" height="116" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="130" y="290" font-size="20" font-weight="700" fill="#000000">LSTM</text>
  <text x="130" y="316" font-size="13" fill="#000000">Large-scale catchment</text>
  <text x="130" y="334" font-size="13" fill="#000000">streamflow &amp; flood forecasting</text>
  <text x="130" y="357" font-size="11.5" font-style="italic" fill="#000000">data-driven · regional</text>

  <!-- SWMM engine -->
  <rect x="490" y="254" width="300" height="116" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="510" y="290" font-size="20" font-weight="700" fill="#000000">SWMM</text>
  <text x="510" y="316" font-size="13" fill="#000000">Urban &amp; rural drainage,</text>
  <text x="510" y="334" font-size="13" fill="#000000">runoff &amp; LID</text>
  <text x="510" y="357" font-size="11.5" font-style="italic" fill="#000000">agentic SWMM workflow</text>

  <line x1="260" y1="370" x2="260" y2="418" stroke="#000000" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="640" y1="370" x2="640" y2="418" stroke="#000000" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- open data -->
  <rect x="70" y="420" width="760" height="74" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="100" y="452" font-size="16" font-weight="700" fill="#000000">Open data</text>
  <text x="100" y="475" font-size="12.5" fill="#000000">global meteorology · catchment attributes · streamflow · terrain · drainage networks</text>
</svg>
